body:
  text: 金師子章序夫龍象之蹴踏於乾坤開奧藏兮説妙法蟣蟻之趹𨀜於土塊傳深法兮轉法輪杜順智儼祖師既滂大法於碧落香象清涼賢德早話明𬍯於黃泉矣所以雖大聖之説傳一味華嚴一乘秀衆教雖弘經之達士其德同香象獨勝餘師焉爰於如來出興之法有何教教內而不見其説否設有教內而不見其説有教外而有其文否設有教外而有其文説權之五十一品之名而不隔歷其位否設有説其位之名不隔歷於十信之初位盡五十二品之功證得無生忍斷盡無明者否復有甚教説一於而包三世間之説否設不對權教故名之曰別教是非隔別之故云別不廢權立實之教頓實者否設有頓實者其經説處純淨土而莊嚴微妙否設有其處淨土而莊嚴微妙非變化而真土否設有非變化而真土於所説之法不約理而以事顯性者否復有那經於序首直烈深位之菩薩否復有那教首隔二乘顯身土之高廣終攝二乘密顯三世間一而不缺之義否設有攝二乘直有益女人否設有利撫女人有現坐之得益五百否設有那經不離自國兮得果否設有不離自國兮悟道者現以龍畜身兮悟道者否設以龍畜身兮悟道者其數一萬否設有少分以龍畜之身悟道者不言攝闡提否闡提者是三世間又中衆生世間也設有攝闡提備説中道否設有説中道正有説止觀否設有説止觀之名現説十如否設有説十如正有後方便者否設有方便切有不依橫計與空花二妄否設有不墮二妄有譬高山先得蒙性光之照益否設少分有是益於教主之故光因果俱時否設有因果俱時非暫時之益否設有非暫時之益於其佛現實報而有包十身通三世間否設有其文復有具十頭十眼十耳十鼻十口十舌十身十手十足十智十如十忍十明十通十解脫十辨十音十無畏十不具法十佛土十處十會十菩薩十波羅蜜十方便十願如是十十無盡事事無礙事事理理圓融之法否唯此一經具此諸德矣所以談之教內世尊拍膝傳之祖道三佛卷舌提祖之就變札於鴈足鄰胡國於楊州韻保之梳粉髮於南風催舊淚於雞林此皆國土世間之説法如來恆説之華嚴也以佛賀出釰於口中切普賢億億之頂祖室擡手於法箭破毗盧純一之貌既往獨説之家無利益流派之境有功德師子之齘破一塵兮出大經卷大象之𮧺迷大虛收粟中矣復有那師文義共遍通達一代所説之經法否設有通達一代立五教判聖教超先代否設有判教超他德説道超世教化同佛否設有説道超他入經藏對三藏勝論議人否設有對三藏論議人有傳教教人得教外益否設有令得教外益從口現出五光人否設有出光人所出光變成寶蓋否設有光成寶蓋舉世號小釋迦否設有號小釋迦入王宮為御見拜否設有為王被拜為皇后見拜并為皇后説經典否設有為皇后被拜及立寺塔被歸依現身不易生升都率否設有登都率門徒繁昌六國所流之法不斷絶于今盛否矣爰金師子章者依則天皇后請藏大師之所説也文約而義深言少而意廣是則破小塵兮出大經卷約大虛兮置一毛中大悟指掌現益扶手碩學大悟之菩薩阿不勤行者乎若欲繼佛祖之迹欲傳事事無礙之功者先須結跏趺坐或用半跏趺坐謂正大座之時一卜坐處於間寂上用蒲團略明方軌雖不事一順向面於初地方當後於十向處以左足在右䏶上舉右足安左䏶上以右手安右䏶上舉左手在右掌中教二之大拇指面與面相柱矣凡正坐之時不得右側左傾前低後仰須耳與肩對鼻與臍相向以舌拄上腭唇與唇上齒與下齒相近眼似開不開似閉不閉是學大聖之人方軌也焉次半跏趺坐者舉左足壓右䏶若也須以止觀之行可依無念一門念發則隨發不發念者是有念也生死何休發念隨念則無念也是名大涅槃無念之無念無相之無相有念之有念有相之有相皆悉外道之所執也更非佛家之説法也請願諸有心倫蹄釋迦佛之海印三昧藏大師之事事觀門莫依小乘家之滅盡三昧外道宗之惡邪執矣耳
